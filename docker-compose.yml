services:
    app:
        image: ${SPECBOOK_IMAGE:-ghcr.io/gustavo-ferreira03/specbook:latest}
        init: true
        shm_size: "1gb"
        restart: unless-stopped
        ports:
            - "4000:4000"
            - "4001:4001"
            - "53692:53692"
        environment:
            HOST: 0.0.0.0
            FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:4001}
            PI_OAUTH_CALLBACK_HOST: 0.0.0.0
        volumes:
            - specbook-storage:/app/apps/backend/storage
        healthcheck:
            test: ["CMD", "curl", "--fail", "--silent", "http://localhost:4000/health"]
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 60s

volumes:
    specbook-storage:
