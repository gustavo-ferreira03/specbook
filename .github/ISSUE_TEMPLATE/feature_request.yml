name: Feature request
description: Propose a focused improvement to Specbook.
title: "feat: "
labels: [enhancement]
body:
    - type: textarea
      id: problem
      attributes:
          label: What problem are you trying to solve?
          description: Explain the current friction with a concrete workflow.
      validations:
          required: true

    - type: textarea
      id: proposal
      attributes:
          label: Proposed behavior
          description: Describe what a user should be able to do and what they should see.
      validations:
          required: true

    - type: textarea
      id: alternatives
      attributes:
          label: Alternatives considered
          description: Describe other approaches or workarounds, if any.
