name: Prepare release

on:
    push:
        branches: [main]
        paths:
            - apps/**
            - Dockerfile
            - entrypoint.sh
            - package.json
            - pnpm-lock.yaml
            - pnpm-workspace.yaml
            - requirements.txt
            - version.txt
            - CHANGELOG.md
    workflow_dispatch:

permissions:
    contents: write
    issues: write
    packages: write
    pull-requests: write

jobs:
    release-please:
        runs-on: ubuntu-latest
        steps:
            - id: release
              uses: googleapis/release-please-action@v4
              with:
                  release-type: simple

            - uses: actions/checkout@v7
              if: ${{ steps.release.outputs.release_created }}

            - uses: docker/setup-buildx-action@v3
              if: ${{ steps.release.outputs.release_created }}

            - uses: docker/login-action@v3
              if: ${{ steps.release.outputs.release_created }}
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - uses: docker/build-push-action@v6
              if: ${{ steps.release.outputs.release_created }}
              with:
                  context: .
                  push: true
                  tags: |
                      ghcr.io/${{ github.repository_owner }}/specbook:latest
                      ghcr.io/${{ github.repository_owner }}/specbook:${{ steps.release.outputs.tag_name }}
                      ghcr.io/${{ github.repository_owner }}/specbook:${{ steps.release.outputs.version }}
                  labels: |
                      org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
                      org.opencontainers.image.revision=${{ github.sha }}
                      org.opencontainers.image.version=${{ steps.release.outputs.tag_name }}
                  build-args: |
                      NEXT_PUBLIC_API_URL=http://localhost:4000
